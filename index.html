<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>東京 アニメ飯再現店DB</title>

<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8398161859137802" crossorigin="anonymous"></script>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<style>
*{box-sizing:border-box}
body{margin:0;background:#11100d;color:#fff;font-family:system-ui,-apple-system,"Segoe UI",sans-serif}
header{padding:28px 16px;text-align:center;background:linear-gradient(135deg,#7c2d12,#ea580c,#facc15);box-shadow:0 10px 30px rgba(0,0,0,.25)}
header h1{margin:0;font-size:30px;letter-spacing:.03em}
header p{margin:8px 0 0;color:#fff7ed;font-weight:600}
.wrap{max-width:1200px;margin:auto;padding:16px}.grid{display:grid;grid-template-columns:390px 1fr;gap:16px}.panel{background:#1c1917;border-radius:20px;padding:16px;border:1px solid rgba(255,255,255,.12);box-shadow:0 12px 30px rgba(0,0,0,.22)}
label{display:block;margin:10px 0 6px;font-weight:800;color:#fed7aa}input,select,textarea{width:100%;padding:12px;border-radius:14px;border:1px solid rgba(255,255,255,.14);background:#0c0a09;color:#fff}button{border:0;border-radius:14px;padding:11px 14px;background:#ea580c;color:#fff;font-weight:800;cursor:pointer}button.secondary{background:#57534e}button.danger{background:#dc2626}.btns{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}#map{height:640px;border-radius:20px;background:#292524}.results{display:grid;gap:10px;max-height:570px;overflow:auto;margin-top:12px}.shop{background:#0c0a09;border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:13px}.shop h3{margin:0 0 6px;color:#fdba74}.tag,.anime,.menu{display:inline-block;padding:4px 8px;border-radius:999px;font-size:12px;margin:2px}.tag{background:#44403c}.anime{background:#7c2d12}.menu{background:#854d0e;font-weight:800}.small{font-size:13px;color:#d6d3d1;line-height:1.65}#dataBox{display:none}textarea{min-height:210px;font-family:Consolas,monospace}.note{background:#292524;border-left:4px solid #f97316;border-radius:12px;padding:10px;margin-top:10px}@media(max-width:900px){.grid{grid-template-columns:1fr}#map{height:430px}}
</style>
</head>
<body>
<header>
<h1>東京 アニメ飯再現店DB</h1>
<p>作品に出てきそうな料理・再現メニュー・コラボ飯を地図で探せるDB</p>
</header>

<main class="wrap"><div class="grid"><section class="panel">
<label>エリア</label><select id="areaMode"></select>
<label>検索</label><input id="keyword" placeholder="例：池袋 ラーメン ジブリ風 カレー コラボ">
<div class="btns"><button onclick="applySearch()">検索</button><button class="secondary" onclick="showData()">CSV</button><button class="secondary" onclick="showResults()">結果</button><button class="danger" onclick="resetStores()">初期化</button></div>
<p id="status" class="small"></p>
<div id="resultsBox" class="results"></div>
<div id="dataBox">
<p class="small">CSV形式：<br>id,name,area,address,lat,lng,anime,menu,tags</p>
<textarea id="csvInput"></textarea>
<div class="btns"><button onclick="applyCsv()">CSV反映</button><button class="secondary" onclick="exportCsv()">CSV出力</button></div>
<textarea id="jsonBox"></textarea>
</div>
</section><section class="panel"><div id="map"></div></section></div></main>

<script>
const STORAGE_KEY = "tokyo_anime_meshi_db_v1";

/* Googleスプレッドシートを公開CSVにしたURLをここに入れる */
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRYXs-nzq0R0R-pg3slV_NStUU_osk4IqAyymllNrEom1bx4oK1wuPhligS9oeA0KdcVei-LK0Dds-F/pub?output=csv";
const MAX_INITIAL_DISPLAY = 150;

const DEFAULT_STORES = [
{id:"anime_food_001",name:"アニメ飯サンプル食堂 秋葉原店",area:"秋葉原",address:"東京都千代田区外神田1丁目",lat:35.6984,lng:139.7730,anime:"異世界グルメ風",menu:"冒険者の肉盛りプレート",tags:["サンプル","肉料理","アニメ飯","秋葉原"]},
{id:"anime_food_002",name:"まんが飯カフェ 池袋店",area:"池袋",address:"東京都豊島区東池袋1丁目",lat:35.7295,lng:139.7109,anime:"青春アニメ風",menu:"放課後ナポリタン",tags:["サンプル","カフェ","ナポリタン","池袋"]},
{id:"anime_food_003",name:"聖地メシダイナー 中野店",area:"中野",address:"東京都中野区中野5丁目",lat:35.7074,lng:139.6658,anime:"日常系アニメ風",menu:"商店街コロッケ定食",tags:["サンプル","定食","商店街","中野"]}
];

let stores=[],filteredStores=[],map,markers=[];

async function init(){
  stores = await loadStores();
  map = L.map("map").setView([35.681236,139.767125],11);
  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap contributors"}).addTo(map);
  document.getElementById("areaMode").addEventListener("change",applySearch);
  document.getElementById("keyword").addEventListener("input",applySearch);
  buildAreas();applySearch();
}

async function loadStores(){
  try{
    if(CSV_URL){const res=await fetch(CSV_URL);const text=await res.text();const csvData=parseCsv(text);if(csvData.length)return csvData;}
  }catch(e){console.error(e)}
  return DEFAULT_STORES;
}

function splitCsvLine(line){
  const out=[];let cur="";let q=false;
  for(let i=0;i<line.length;i++){
    const c=line[i];
    if(c==='"'&&line[i+1]==='"'){cur+='"';i++;continue}
    if(c==='"'){q=!q;continue}
    if(c===','&&!q){out.push(cur);cur="";continue}
    cur+=c;
  }
  out.push(cur);return out;
}
function csvEscape(v){v=String(v??"");return /[",\n]/.test(v)?'"'+v.replaceAll('"','""')+'"':v}
function parseCsv(text){
  const lines=text.trim().split(/\r?\n/);if(lines.length<2)return[];
  const data=[];
  for(let i=1;i<lines.length;i++){
    const row=splitCsvLine(lines[i]);if(row.length<6)continue;
    data.push({id:row[0],name:row[1],area:row[2],address:row[3],lat:Number(row[4]),lng:Number(row[5]),anime:row[6]||"",menu:row[7]||"",tags:(row[8]||"").split("|").filter(Boolean)});
  }
  return data.filter(x=>x.name&&Number.isFinite(x.lat)&&Number.isFinite(x.lng));
}
function buildAreas(){const select=document.getElementById("areaMode");const areas=[...new Set(stores.map(x=>x.area).filter(Boolean))].sort();select.innerHTML='<option value="all">東京全体</option>';areas.forEach(a=>{const opt=document.createElement("option");opt.value=a;opt.textContent=a;select.appendChild(opt)})}
function applySearch(){const area=document.getElementById("areaMode").value;const kw=document.getElementById("keyword").value.toLowerCase();let results=stores.filter(s=>{const text=[s.name,s.area,s.address,s.anime,s.menu,(s.tags||[]).join(" ")].join(" ").toLowerCase();return(area==="all"||s.area===area)&&(!kw||text.includes(kw))});filteredStores=results.slice(0,MAX_INITIAL_DISPLAY);renderResults();renderMarkers();document.getElementById("status").textContent=filteredStores.length+"件表示 / 該当"+results.length+"件"}
function renderResults(){const box=document.getElementById("resultsBox");if(!filteredStores.length){box.innerHTML="該当なし";return}box.innerHTML=filteredStores.map((s,i)=>`<div class="shop"><h3>${i+1}. ${s.name}</h3><p>${s.address}</p><p><span class="anime">${s.anime||"作品未設定"}</span><span class="menu">${s.menu||"メニュー未設定"}</span><span class="tag">${s.area}</span>${(s.tags||[]).map(t=>`<span class="tag">${t}</span>`).join("")}</p><div class="btns"><button class="secondary" onclick="focusStore('${s.id}')">地図</button><button onclick="openGoogle('${s.id}')">GoogleMap</button></div></div>`).join("")}
function renderMarkers(){markers.forEach(m=>m.remove());markers=[];filteredStores.forEach(s=>{const marker=L.marker([s.lat,s.lng]).addTo(map);marker.storeId=s.id;marker.bindPopup(`<b>${s.name}</b><br>${s.menu||""}`);markers.push(marker)})}
function focusStore(id){const s=stores.find(x=>x.id===id);if(!s)return;map.setView([s.lat,s.lng],16);const m=markers.find(x=>x.storeId===id);if(m)m.openPopup()}
function openGoogle(id){const s=stores.find(x=>x.id===id);if(!s)return;window.open("https://www.google.com/maps/search/?api=1&query="+encodeURIComponent(s.name+" "+s.address),"_blank")}
function applyCsv(){stores=parseCsv(document.getElementById("csvInput").value);buildAreas();applySearch();showResults()}
function exportCsv(){const header="id,name,area,address,lat,lng,anime,menu,tags";const csv=stores.map(s=>[s.id,s.name,s.area,s.address,s.lat,s.lng,s.anime,s.menu,(s.tags||[]).join("|")].map(csvEscape).join(",")).join("\n");document.getElementById("csvInput").value=header+"\n"+csv;document.getElementById("jsonBox").value=JSON.stringify(stores,null,2)}
function resetStores(){localStorage.removeItem(STORAGE_KEY);stores=DEFAULT_STORES;buildAreas();applySearch()}
function showData(){document.getElementById("dataBox").style.display="block";document.getElementById("resultsBox").style.display="none";exportCsv()}
function showResults(){document.getElementById("dataBox").style.display="none";document.getElementById("resultsBox").style.display="grid"}
window.addEventListener("load",init);
</script>

<script defer src="/_vercel/insights/script.js"></script>
</body>
</html>
